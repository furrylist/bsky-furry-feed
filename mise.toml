[tools]
go = "1.26.4"
"go:connectrpc.com/connect/cmd/protoc-gen-connect-go" = "v1.11.0"
"go:github.com/bufbuild/buf/cmd/buf" = "1.71.0"
"go:github.com/golang-migrate/migrate/v4/cmd/migrate" = { version = "4.19.0", tags = "postgres" }
"go:github.com/sqlc-dev/sqlc/cmd/sqlc" = "1.31.1"
"go:google.golang.org/protobuf/cmd/protoc-gen-go" = "1.36.11"
node = "23.1.0"
"npm:@bufbuild/protoc-gen-es" = "1.2.0"
"npm:@bufbuild/protoc-gen-connect-web" = "0.9.0"
pnpm = "9.12.3"
python = "3.8.16"
"pipx" = "1.7.1"
"pipx:sqlfluff" = "2.3.2"
golangci-lint = "2.12.2"
prek = "0.4.9"

[tasks]
"generate:sqlc" = "sqlc generate"
"generate:buf" = "cd proto && buf generate"
generate = { depends = ["generate:sqlc", "generate:buf"] }

[env]
CGO_CFLAGS = "-DHAVE_STRCHRNUL"
# This fixes testcontainers with colima on macOS. idk why, lol
TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE = "/var/run/docker.sock"
